services:
  - type: web
    name: painel-implantacao-v2
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: painel-implantacao-db
          property: connectionString
      - key: ADMIN_USER
        value: gerber
      - key: ADMIN_PASSWORD
        value: admin123

databases:
  - name: painel-implantacao-db
    databaseName: painel_implantacao
    user: painel_implantacao_user
